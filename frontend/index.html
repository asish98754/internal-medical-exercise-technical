<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aisne Cadastre - Parcels Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="CSS.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
  <div id="map"></div>
  <div id="info">Click or Drag on a parcel to see details</div>

  <script>
    // Map initialization 
    const map = L.map('map', { zoomControl: false }).setView([49.45, 3.5], 10);

    L.control
      .zoom({
        position: 'bottomright',
      })
      .addTo(map);

    // Base map
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution:
        '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom: 19,
    }).addTo(map);

    // Custom pin icon
    const parcelIcon = L.icon({
      iconUrl:
        'https://cdn.jsdelivr.net/gh/pointhi/leaflet-color-markers@master/img/marker-icon-red.png',
      shadowUrl:
        'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
      shadowSize: [41, 41],
    });

    // Popup HTML generation (keeps your design)
    function buildParcelPopupContent(props) {
      return `
  <div style="min-width: 240px; font-family: Arial; line-height: 1.5;">
    <strong style="font-size: 1.1em;">Parcel information</strong><br><br>

    <table style="border-collapse: collapse; font-size: 13px; width: 100%;">
      <tr>
        <th colspan="2" style="border: 1px solid #555; padding: 4px 8px; background:#f0f0f0;">
          Parcel IDU: ${props.idu || 'N/A'}
        </th>
      </tr>

      <tr>
        <td style="border: 1px solid #555; padding: 4px 8px;">Commune</td>
        <td style="border: 1px solid #555; padding: 4px 8px;">
          ${props.nom_com || 'N/A'} (${props.code_dep || ''}${props.code_com || 'N/A'})
        </td>
      </tr>

      <tr>
        <td style="border: 1px solid #555; padding: 4px 8px;">Section</td>
        <td style="border: 1px solid #555; padding: 4px 8px;">${props.section || 'N/A'}</td>
      </tr>

      <tr>
        <td style="border: 1px solid #555; padding: 4px 8px;">Number</td>
        <td style="border: 1px solid #555; padding: 4px 8px;">${props.numero || 'N/A'}</td>
      </tr>

      <tr>
        <td style="border: 1px solid #555; padding: 4px 8px;">Owner SIREN</td>
        <td style="border: 1px solid #555; padding: 4px 8px;">
          Not available
          <small style="color: #555; display: block; margin-top: 6px;">
            • Parcellaire Express PCI Vecteur contains only geometry + administrative identifiers.<br>
            • Owner data (incl. SIREN) comes from MAJIC (DGFiP).<br>
            • MAJIC is restricted (fiscal secrecy + RGPD).<br>
            • No public per‑parcel owner lookup API exists.<br>
            • Only aggregated personnes morales data is public.
          </small>
        </td>
      </tr>
    </table>

    <hr style="margin: 12px 0;">

    <button onclick="lookupSirene('356000000')"
      style="padding: 6px 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">
      Demo: Google France (SIREN 356000000)
    </button>
  </div>
      `;
    }

    // Load parcel centroids
    fetch('/api/parcels-points')
      .then((response) => response.json())
      .then((data) => {
        const geojsonLayer = L.geoJSON(data, {
          pointToLayer: function (feature, latlng) {
            return L.marker(latlng, { icon: parcelIcon });
          },
          onEachFeature: function (feature, layer) {
            const props = feature.properties;
            const popupContent = buildParcelPopupContent(props);

            layer.bindPopup(popupContent);

            // Side info panel on hover
            layer.on('mouseover', function () {
              document.getElementById('info').innerHTML = `
                <b>${props.idu}</b><br>
                ${props.nom_com} – ${props.section}${props.numero}
              `;
            });

            layer.on('mouseout', function () {
              document.getElementById('info').innerHTML =
                'Click or Drag on a parcel to see details';
            });
          },
        }).addTo(map);

        // Zoom to loaded parcels
        map.fitBounds(geojsonLayer.getBounds(), { padding: [50, 50] });
      })
      .catch((error) => {
        console.error('Error loading parcels:', error);
        alert('Could not load parcels from API. Is the backend running?');
      });

    // Sirene lookup via backend proxy
    async function lookupSirene(siren) {
      try {
        const response = await fetch(
          `http://localhost:3001/api/sirene/${siren}`
        );

        if (response.status === 404) {
          const data = await response.json().catch(() => ({}));
          alert(
            `SIREN not found in Sirene database.\n\n` +
              (data.error ? `Details: ${data.error}` : '') +
              `\n\nThis means this SIREN is not returned by the API with your token.`
          );
          return;
        }

        if (response.status === 401) {
          const data = await response.json().catch(() => ({}));
          alert(
            `Unauthorized to call Sirene API (401).\n\n` +
              `Check that SIRENE_API_TOKEN in your .env is valid.\n` +
              (data.error ? `Details: ${data.error}` : '')
          );
          return;
        }

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        let info = `SIREN: ${data.siren}\n`;
        info += `Company: ${data.company}\n`;
        info += `Legal form: ${data.legalForm}\n`;
        info += `Address: ${data.address}, ${data.postalCode} ${data.city}\n`;
        info += `Creation date: ${data.creationDate}`;

        alert(info);
      } catch (err) {
        alert('Error: ' + err.message + '\n(Check backend running or token)');
      }
    }
  </script>
</body>
</html>
